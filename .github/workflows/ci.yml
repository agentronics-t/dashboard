name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  node:
    name: Node — lint · typecheck · test · build
    runs-on: ubuntu-latest
    # pgvector image so the schema migration's CREATE EXTENSION vector succeeds.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: intel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 12
    env:
      # tests read DATABASE_URL from the env; node strip-types needs Node 22+.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/intel
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build lint
      - name: Migrate schema
        run: |
          echo "DATABASE_URL=${DATABASE_URL}" > packages/intel-schema/.env
          pnpm --filter @agentronics/intel-schema db:migrate
      - run: pnpm turbo test

  ml:
    name: Python ML — ruff · pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/intel-ml
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.10.2"
      - run: uv sync
      - run: uv run ruff check src tests
      - run: uv run pytest -q

  docker:
    name: Docker build (no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build images (amd64, single-platform)
        run: |
          for svc in intel-api intel-worker; do
            docker build --platform linux/amd64 --provenance=false --sbom=false \
              -f apps/$svc/Dockerfile -t $svc:ci .
          done
          docker build --platform linux/amd64 --provenance=false --sbom=false \
            -t intel-ml:ci apps/intel-ml
