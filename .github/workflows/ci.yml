name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  node:
    name: Node — lint · typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build lint
      # intel-schema + worker tests need a Postgres; provide a throwaway one.
      - name: Start Postgres
        run: |
          docker run -d --name pg -e POSTGRES_PASSWORD=postgres -p 5432:5432 \
            -e POSTGRES_DB=intel postgres:16
          for i in $(seq 1 30); do docker exec pg pg_isready -U postgres && break; sleep 1; done
          docker exec pg psql -U postgres -d intel -c 'CREATE EXTENSION IF NOT EXISTS vector;' || \
            echo "pgvector not in base image — schema migrate will add it"
      - name: Migrate + test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/intel
        run: |
          pnpm --filter @agentronics/intel-schema db:migrate || true
          pnpm turbo test

  ml:
    name: Python ML — ruff · pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/intel-ml
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.10.2"
      - run: uv sync
      - run: uv run ruff check src tests
      - run: uv run pytest -q

  docker:
    name: Docker build (no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build images (amd64, single-platform)
        run: |
          for svc in intel-api intel-worker; do
            docker build --platform linux/amd64 --provenance=false --sbom=false \
              -f apps/$svc/Dockerfile -t $svc:ci .
          done
          docker build --platform linux/amd64 --provenance=false --sbom=false \
            -t intel-ml:ci apps/intel-ml
